<div class="carousel-shell">

  <!-- TOP CONTENT -->
  <div class="carousel-layout">

    <div class="carousel-content">

      <div class="title">
        <span class="title-glass">
          {{ slidesData[index].title }}
        </span>

        <span class="title-chart-accent" [ngClass]="currentChartAccent">
        </span>
      </div>

      <div class="meta">

        <small>
          {{ slidesData[index].tag }}
        </small>

        <p>
          {{ slidesData[index].desc }}
        </p>

        <div class="actions">
          <button class="arrow" (click)="prev()">←</button>
          <button class="arrow" (click)="next()">→</button>
          <button class="learn-btn">
            LEARN MORE →
          </button>
        </div>

      </div>

    </div>

    <div class="carousel-image">

      <div class="image-border">
        <img [src]="slidesData[index].image" alt="">
      </div>

    </div>

  </div>

</div>
