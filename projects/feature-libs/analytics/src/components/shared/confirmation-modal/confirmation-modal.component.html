<div class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="heading">Data Confirmation</h3>
      <button type="button" class="close" (click)="cancel()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="text">There will be a delay in loading completed status data. Do you want to continue?</div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-primary" (click)="save()">Yes</button>
      <button type="button" class="btn btn-primary" (click)="closeModal()">No</button>
    </div>
    </div>
  </div>
